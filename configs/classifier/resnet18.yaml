# Reference hyperparameters for the text/non-text false-positive filter.
# Mirrors the flags accepted by `flashmask train-classifier`.
backbone: resnet18
input_size: 256
epochs: 15
batch_size: 64
lr: 0.0001
edge_aug_p: 0.1 # Canny-edge augmentation share (diagram classifier uses 0.0)
balance_classes: true
