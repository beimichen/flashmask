# Phase 1: pretrain on synthetic data with heavy augmentation to learn the
# general "text region" appearance before seeing scarce real labels.
name: pretrain_synthetic
args:
  epochs: 80
  batch: 16
  optimizer: SGD
  lr0: 0.01
  lrf: 0.1
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  box: 7.5
  cls: 0.5
  dfl: 1.5
  patience: 50
  amp: true
  # heavy augmentation
  mosaic: 1.0
  mixup: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 2.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  flipud: 0.0
  erasing: 0.4
  close_mosaic: 10
